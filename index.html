<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 LR World Cup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1>🏆 LR WORLD CUP</h1>
                <div class="header-tagline">📊 Live results from Wikipedia • Daily Updates</div>
            </div>
        </header>

        <main class="main-content">
            <!-- Navigation -->
            <nav class="nav-tabs">
                <button class="nav-btn active" data-tab="standings">Standings</button>
                <button class="nav-btn" data-tab="matches">Matches</button>
                <button class="nav-btn" data-tab="schedule">Schedule</button>
            </nav>

            <!-- Standings Tab -->
            <section id="standings" class="tab-content active">
                <div class="standings-wrapper">
                    <div id="standings-list"></div>
                </div>
            </section>

            <!-- Matches Tab -->
            <section id="matches" class="tab-content">
                <div class="matches-container">
                    <div class="stage-title">Group Stage Results</div>
                    <div id="group-results" class="matches-grid"></div>
                    <div class="stage-title" style="margin-top: 40px;">Knockout Results</div>
                    <div id="knockout-results" class="matches-grid"></div>
                </div>
            </section>

            <!-- Schedule Tab -->
            <section id="schedule" class="tab-content">
                <div class="schedule-wrapper">
                    <div class="schedule-controls">
                        <button class="schedule-btn active" data-stage="group">Group Stage</button>
                        <button class="schedule-btn" data-stage="knockout">Knockout</button>
                    </div>
                    <div id="group-schedule" class="schedule-list active"></div>
                    <div id="knockout-schedule" class="schedule-list"></div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <button id="lockBtn" class="lock-btn" onclick="togglePlayersLock()">🔒 Players</button>
            <p>&copy; 2026 LR World Cup</p>
        </footer>

        <!-- PIN Modal -->
        <div id="pinModal" class="pin-overlay hidden">
            <div class="pin-modal">
                <div class="pin-icon">🔒</div>
                <h2 class="pin-title">Players are locked</h2>
                <p class="pin-subtitle">Enter the PIN to reveal player names</p>
                <input id="pinInput" class="pin-input" type="password" maxlength="4" placeholder="••••" inputmode="numeric" />
                <p id="pinError" class="pin-error hidden">Incorrect PIN — try again</p>
                <div class="pin-actions">
                    <button type="button" class="pin-btn-cancel" onclick="closePinModal()">Cancel</button>
                    <button type="button" class="pin-btn-submit" onclick="submitPin()">Unlock</button>
                </div>
            </div>
        </div>
    </div>

    <script src="players.js"></script>
    <script src="script.js"></script>
</body>
</html>
