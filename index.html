<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 LR World Cup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1>🏆 LR WORLD CUP</h1>
                <div class="header-tagline">📊 Live results from Wikipedia • Daily Updates</div>
            </div>
        </header>

        <main class="main-content">
            <!-- Navigation -->
            <nav class="nav-tabs">
                <button class="nav-btn active" data-tab="standings">Standings</button>
                <button class="nav-btn" data-tab="matches">Matches</button>
                <button class="nav-btn" data-tab="schedule">Schedule</button>
            </nav>

            <!-- Standings Tab -->
            <section id="standings" class="tab-content active">
                <div class="standings-wrapper">
                    <div id="standings-list"></div>
                </div>
            </section>

            <!-- Matches Tab -->
            <section id="matches" class="tab-content">
                <div class="matches-container">
                    <div class="stage-title">Group Stage Results</div>
                    <div id="group-results" class="matches-grid"></div>
                    <div class="stage-title" style="margin-top: 40px;">Knockout Results</div>
                    <div id="knockout-results" class="matches-grid"></div>
                </div>
            </section>

            <!-- Schedule Tab -->
            <section id="schedule" class="tab-content">
                <div class="schedule-wrapper">
                    <div class="schedule-controls">
                        <button class="schedule-btn active" data-stage="group">Group Stage</button>
                        <button class="schedule-btn" data-stage="knockout">Knockout</button>
                    </div>
                    <div id="group-schedule" class="schedule-list active"></div>
                    <div id="knockout-schedule" class="schedule-list"></div>
                </div>
            </section>
        </main>

        <!-- Footer with Admin Access -->
        <footer class="app-footer">
            <button class="admin-access-btn" onclick="showAdminPrompt()">⚙️</button>
            <p>&copy; 2026 LR World Cup</p>
        </footer>

        <!-- Admin Modal -->
        <div id="adminModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Admin Dashboard</h2>
                    <button class="close-btn" onclick="closeAdminModal()">×</button>
                </div>
                <div class="modal-body">
                    <div class="admin-section">
                        <h3>Player Management</h3>
                        <div class="form-group">
                            <input type="text" id="playerName" placeholder="Player name" />
                            <select id="teamSelect">
                                <option value="">Select Team</option>
                            </select>
                            <button onclick="addPlayer()">Add</button>
                        </div>
                        <div id="players-list" class="players-table"></div>
                    </div>

                    <div class="admin-section">
                        <h3>Bulk Import</h3>
                        <textarea id="bulkImportText" placeholder="Name, Team&#10;John, Argentina&#10;Sarah, Brazil"></textarea>
                        <button onclick="bulkImportPlayers()" class="btn-primary">Import</button>
                    </div>

                    <div class="admin-section">
                        <h3>Update Scores</h3>
                        <div id="score-updates"></div>
                    </div>

                    <div class="admin-section">
                        <h3>Data Management</h3>
                        <button onclick="exportPlayersToFile()" class="btn-secondary">Export Players (JSON)</button>
                        <button onclick="exportData()" class="btn-secondary">Export All Data</button>
                        <button onclick="clearAllData()" class="btn-danger">Clear All</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="players.js"></script>
    <script src="script.js"></script>
</body>
</html>
