<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>🏆 World Cup 2026</h1>
            <div class="header-tagline">Last updated: 18 Jun 2026</div>
        </header>

        <!-- Live Stats -->
        <div id="stats-bar" class="stats-bar"></div>

        <!-- Navigation -->
        <nav class="nav-tabs">
            <button type="button" class="nav-btn active" data-tab="standings">Standings</button>
            <button type="button" class="nav-btn" data-tab="schedule">Schedule</button>
            <button type="button" id="lockBtn" class="lock-btn" onclick="togglePlayersLock()">🔒 Players</button>
        </nav>

        <main class="main-content">
            <!-- Standings Tab -->
            <section id="standings" class="tab-content active">
                <div id="standings-list"></div>
            </section>

            <!-- Schedule Tab -->
            <section id="schedule" class="tab-content">
                <div class="schedule-controls">
                    <button type="button" class="schedule-btn active" data-stage="group">Group Stage</button>
                    <button type="button" class="schedule-btn" data-stage="knockout">Knockout</button>
                </div>
                <div id="group-schedule" class="schedule-list active"></div>
                <div id="knockout-schedule" class="schedule-list"></div>
            </section>
        </main>

        <!-- PIN Modal -->
        <div id="pinModal" class="pin-overlay hidden">
            <div class="pin-modal">
                <div class="pin-icon">🔒</div>
                <h2 class="pin-title">Players are locked</h2>
                <p class="pin-subtitle">Enter the PIN to reveal player names</p>
                <input id="pinInput" class="pin-input" type="password" maxlength="4" placeholder="••••" inputmode="numeric" />
                <p id="pinError" class="pin-error hidden">Incorrect PIN — try again</p>
                <div class="pin-actions">
                    <button type="button" class="pin-btn-cancel" onclick="closePinModal()">Cancel</button>
                    <button type="button" class="pin-btn-submit" onclick="submitPin()">Unlock</button>
                </div>
            </div>
        </div>
    </div>

    <script src="players.js"></script>
    <script src="script.js"></script>
</body>
</html>
